# Deploy backend to Railway on every push to main
name: Deploy Backend to Railway

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'

env:
  RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
  RAILWAY_SERVICE_NAME: mri-x-jas-helper-backend

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: |
          curl -fsSL https://railway.app/install.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Link Railway project
        run: |
          railway link --token $RAILWAY_TOKEN --project ${{ vars.RAILWAY_PROJECT_ID }}
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Set Railway variables
        run: |
          railway variables set MODAL_OLLAMA_URL="${{ secrets.MODAL_OLLAMA_URL }}"
          railway variables set MODAL_OLLAMA_MODEL="${{ secrets.MODAL_OLLAMA_MODEL }}"
          railway variables set KIMI_API_KEY="${{ secrets.KIMI_API_KEY }}"
          railway variables set MINIMAX_API_KEY="${{ secrets.MINIMAX_API_KEY }}"
          railway variables set DEEPGRAM_API_KEY="${{ secrets.DEEPGRAM_API_KEY }}"
          railway variables set PORT=8080
          railway variables set NODE_ENV=production
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Deploy via Docker build
        run: |
          railway up --service ${{ env.RAILWAY_SERVICE_NAME }}
          railway deploy --service ${{ env.RAILWAY_SERVICE_NAME }}
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Get deployment URL
        run: |
          railway status --service ${{ env.RAILWAY_SERVICE_NAME }}
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
